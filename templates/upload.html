<!DOCTYPE html>
<html>
<head>
    <title>Upload - VulnApp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>📤 File Upload</h2>
        {% if message %}
        <div class="alert success">{{ message }}</div>
        {% endif %}
        
        <form method="POST" action="/upload" enctype="multipart/form-data" class="form-box">
            <div class="form-group">
                <label>Select file:</label>
                <input type="file" name="file" required>
            </div>
            <button type="submit" class="btn">Upload</button>
        </form>
        
        <p class="warning">⚠️ Try uploading: .php, .sh, malicious.txt, webshell.php</p>
        <p><a href="/dashboard">Dashboard</a> | <a href="/">Back</a></p>
    </div>
</body>
</html>
