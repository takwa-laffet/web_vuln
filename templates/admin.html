<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - VulnApp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>🧑‍💻 Admin Panel</h2>
        
        <h3>Users</h3>
        <table>
            <tr><th>ID</th><th>Username</th><th>Role</th></tr>
            {% for u in users %}
            <tr><td>{{ u[0] }}</td><td>{{ u[1] }}</td><td>{{ u[3] }}</td></tr>
            {% endfor %}
        </table>
        
        <h3>Recent Logs</h3>
        <table>
            <tr><th>Time</th><th>User</th><th>Action</th><th>IP</th><th>Details</th></tr>
            {% for l in logs %}
            <tr><td>{{ l[1] }}</td><td>{{ l[2] }}</td><td>{{ l[3] }}</td><td>{{ l[4] }}</td><td>{{ l[5] }}</td></tr>
            {% endfor %}
        </table>
        
        <p><a href="/dashboard">Dashboard</a> | <a href="/">Back</a></p>
    </div>
</body>
</html>
